<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    NaviAble Flutter Web — index.html
    The <base href> is required by Flutter web's URL strategy.
  -->
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
        content="NaviAble — AI-powered community accessibility verification platform.">
  <meta name="theme-color" content="#4361EE">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#9855;</text></svg>">

  <title>NaviAble — Accessibility Verification</title>

  <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDyWJOw5w-IfLyYfEMptyP1z61LHn_HgYI"></script>

  <style>
    body {
      margin: 0;
      background-color: #F0F4F8;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #loading-splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #F0F4F8;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }
    #loading-splash.hidden { opacity: 0; pointer-events: none; }
    .splash-icon  { font-size: 64px; margin-bottom: 24px; }
    .splash-title { font-size: 28px; font-weight: 700; color: #4361EE; }
    .splash-sub   { font-size: 14px; color: #718096; margin-top: 6px; }
    .splash-spin  {
      margin-top: 32px; width: 40px; height: 40px;
      border: 4px solid #DDE3EC; border-top-color: #4361EE;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading-splash" aria-label="Loading NaviAble" role="status">
    <div class="splash-icon" aria-hidden="true">&#9855;</div>
    <div class="splash-title">NaviAble</div>
    <div class="splash-sub">Accessibility Verification Platform</div>
    <div class="splash-spin" aria-hidden="true"></div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var s = document.getElementById('loading-splash');
      if (s) { s.classList.add('hidden'); setTimeout(function(){ s.remove(); }, 500); }
    });
  </script>
</body>
</html>
