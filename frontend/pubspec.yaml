name: naviable
description: >
  NaviAble — Community-driven AI-powered Accessibility Verification Platform.
  Connects to the FastAPI backend (YOLOv11 + RoBERTa) to verify whether
  locations are genuinely accessible based on user-submitted photos and reviews.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ────────────────────────────────────────────────────
  # flutter_riverpod: Reactive, compile-time safe state management.
  # Chosen over Provider and Bloc for its simplicity and testability.
  flutter_riverpod: ^2.5.1

  # ── HTTP Client ────────────────────────────────────────────────────────
  # dio: Feature-rich HTTP client with Interceptors for JWT, logging,
  # and retry logic. Required by the .agent skill specification.
  dio: ^5.4.3

  # ── Image Compression ─────────────────────────────────────────────────
  # flutter_image_compress: Pre-compress uploaded images before sending
  # to the FastAPI backend. Critical to prevent CUDA OOM on the GTX 1650 Ti
  # (4 GB VRAM) when YOLO loads large images.
  flutter_image_compress: ^2.2.0

  # ── Image Picking ─────────────────────────────────────────────────────
  # image_picker: Cross-platform gallery / camera access.
  # Web: opens file picker dialog. Mobile: opens gallery or camera.
  image_picker: ^1.1.2

  # ── UUID Generation ───────────────────────────────────────────────────
  # uuid: Generates RFC 4122 UUIDs for location_id form field.
  uuid: ^4.4.0

  # ── UI / Icons ────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8

  # ── Routing ────────────────────────────────────────────────────────────
  # go_router: Declarative routing with path parameters, query strings, and
  # nested navigation. Replaces imperative Navigator for better testability.
  go_router: ^14.2.0

  # ── Maps + Geolocation ────────────────────────────────────────────────
  # flutter_map: Open-source map widget (OpenStreetMap) with no API key needed.
  # latlong2: LatLng coordinate representation for flutter_map.
  # geolocator: Cross-platform location access with permissions handling.
  # geocoding: Forward/reverse geocoding using platform-native services.
  # flutter_polyline_points: Decode encoded polyline from Directions API.
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  flutter_polyline_points: ^2.1.0

  # ── Image Metadata ────────────────────────────────────────────────────
  # native_exif: Read EXIF GPS on-device for early location validation.
  # cached_network_image: Cache downloaded images (e.g., contribution photos).
  native_exif: ^0.6.2
  cached_network_image: ^3.3.1

  # ── Utilities ──────────────────────────────────────────────────────────
  # collection: Higher-order functions (groupBy, minBy, etc.).
  # intl: Localized date/number formatting.
  # riverpod_annotation: Codegen for Riverpod providers (with build_runner).
  collection: ^1.18.0
  intl: ^0.19.0
  riverpod_annotation: ^2.3.5

  # ── Permissions ────────────────────────────────────────────────────────
  # permission_handler: Request runtime permissions (camera, location, etc).
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
