<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NaviAble - Accessibility Checker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .section {
            margin-bottom: 30px;
        }

        .section h2 {
            color: #333;
            font-size: 1.5em;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .upload-area:hover {
            background: #f8f9ff;
            border-color: #764ba2;
        }

        .upload-area.dragover {
            background: #f8f9ff;
            border-color: #764ba2;
            transform: scale(1.02);
        }

        .upload-area input[type="file"] {
            display: none;
        }

        .upload-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .upload-text {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        .upload-hint {
            color: #999;
            font-size: 0.9em;
        }

        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-right: 10px;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .button.secondary {
            background: #e0e0e0;
            color: #333;
        }

        .image-preview {
            margin: 20px 0;
            border-radius: 8px;
            overflow: hidden;
            max-width: 100%;
            max-height: 400px;
        }

        .image-preview img {
            width: 100%;
            height: auto;
            display: block;
        }

        .predictions {
            margin-top: 30px;
        }

        .prediction-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }

        .prediction-class {
            font-weight: bold;
            font-size: 1.1em;
            color: #333;
            margin-bottom: 10px;
        }

        .prediction-confidence {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .confidence-label {
            font-weight: 500;
            color: #666;
            min-width: 100px;
        }

        .confidence-bar {
            flex: 1;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
        }

        .confidence-value {
            font-weight: bold;
            color: #667eea;
            min-width: 50px;
            text-align: right;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1em;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .rating-group {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .rating-star {
            font-size: 2em;
            cursor: pointer;
            color: #ddd;
            transition: color 0.2s;
        }

        .rating-star:hover,
        .rating-star.active {
            color: #ffc107;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-weight: 500;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .alert {
            padding: 15px 20px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .bbox {
            position: relative;
            display: inline-block;
        }

        .bbox-canvas {
            border: 2px solid #667eea;
            border-radius: 8px;
            max-width: 100%;
            margin: 20px 0;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab-button {
            background: none;
            border: none;
            padding: 15px 20px;
            cursor: pointer;
            font-size: 1em;
            color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }

        .tab-button.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        @media (max-width: 768px) {
            .card {
                padding: 20px;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .upload-area {
                padding: 20px;
            }

            .upload-icon {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>♿ NaviAble Accessibility Checker</h1>
            <p>Detect ramps and stairs in public spaces using AI</p>
        </div>

        <div class="card">
            <div class="tab-buttons">
                <button class="tab-button active" data-tab="upload">Upload & Predict</button>
                <button class="tab-button" data-tab="review">Submit Review</button>
            </div>

            <!-- Upload Tab -->
            <div id="upload" class="tab-content active">
                <div class="section">
                    <h2>Step 1: Upload Image</h2>
                    <div class="upload-area" id="uploadArea">
                        <div class="upload-icon">📸</div>
                        <div class="upload-text">Click to upload or drag and drop</div>
                        <div class="upload-hint">PNG, JPG up to 10MB</div>
                        <input type="file" id="fileInput" accept="image/png,image/jpeg">
                    </div>
                </div>

                <div id="imagePreviewContainer"></div>

                <div id="predictionsContainer"></div>

                <div id="alertContainer"></div>
            </div>

            <!-- Review Tab -->
            <div id="review" class="tab-content">
                <div class="section">
                    <h2>Step 2: Submit Accessibility Review</h2>
                    <form id="reviewForm">
                        <div class="form-group">
                            <label>Location Name *</label>
                            <input type="text" id="locationName" placeholder="e.g., Main Street Entrance" required>
                        </div>

                        <div class="form-group">
                            <label>Location Type *</label>
                            <select id="locationType" required>
                                <option value="">Select type...</option>
                                <option value="entrance">Building Entrance</option>
                                <option value="parking">Parking Area</option>
                                <option value="sidewalk">Sidewalk/Pathway</option>
                                <option value="restroom">Restroom</option>
                                <option value="elevator">Elevator/Lift</option>
                                <option value="other">Other</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Accessibility Rating *</label>
                            <div class="rating-group" id="ratingGroup">
                                <span class="rating-star" data-rating="1">⭐</span>
                                <span class="rating-star" data-rating="2">⭐</span>
                                <span class="rating-star" data-rating="3">⭐</span>
                                <span class="rating-star" data-rating="4">⭐</span>
                                <span class="rating-star" data-rating="5">⭐</span>
                            </div>
                            <input type="hidden" id="accessibilityRating" required>
                        </div>

                        <div class="form-group">
                            <label>Your Review *</label>
                            <textarea id="reviewText" placeholder="Describe the accessibility features or barriers you observed..." required></textarea>
                        </div>

                        <button type="submit" class="button">Submit Review</button>
                        <button type="reset" class="button secondary">Clear</button>
                    </form>

                    <div id="reviewAlertContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentPredictionId = null;
        let currentDetectedFeatures = [];
        const API_BASE = '/api/v1';

        // Tab switching
        document.querySelectorAll('.tab-button').forEach(button => {
            button.addEventListener('click', (e) => {
                const tabName = e.target.dataset.tab;
                document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
                document.querySelectorAll('.tab-button').forEach(tb => tb.classList.remove('active'));
                document.getElementById(tabName).classList.add('active');
                e.target.classList.add('active');
            });
        });

        // File upload handling
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');

        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                fileInput.files = e.dataTransfer.files;
                handleFileSelect();
            }
        });

        fileInput.addEventListener('change', handleFileSelect);

        function showAlert(container, message, type = 'info') {
            const alert = document.createElement('div');
            alert.className = `alert ${type}`;
            alert.textContent = message;
            container.innerHTML = '';
            container.appendChild(alert);
        }

        async function handleFileSelect() {
            const file = fileInput.files[0];
            if (!file) return;

            const alertContainer = document.getElementById('alertContainer');
            const formData = new FormData();
            formData.append('image', file);

            // Show image preview
            const reader = new FileReader();
            reader.onload = (e) => {
                const preview = document.createElement('div');
                preview.innerHTML = `<img src="${e.target.result}" class="image-preview" alt="Preview">`;
                document.getElementById('imagePreviewContainer').innerHTML = preview.innerHTML;
            };
            reader.readAsDataURL(file);

            // Make prediction
            showAlert(alertContainer, 'Analyzing image...', 'info');

            try {
                const response = await fetch(`${API_BASE}/predict`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                currentPredictionId = data.prediction_id;
                currentDetectedFeatures = data.features;

                displayPredictions(data);
                showAlert(alertContainer, `✅ Prediction complete! ${data.objects_detected} feature(s) detected.`, 'success');
            } catch (error) {
                showAlert(alertContainer, `❌ Prediction failed: ${error.message}`, 'error');
                console.error('Error:', error);
            }
        }

        function displayPredictions(data) {
            const container = document.getElementById('predictionsContainer');
            if (data.features.length === 0) {
                container.innerHTML = '<div class="alert info">No accessibility features detected in this image.</div>';
                return;
            }

            let html = `
                <div class="section">
                    <h2>Detected Features</h2>
                    <div class="stats">
                        <div class="stat-card">
                            <div class="stat-value">${data.objects_detected}</div>
                            <div class="stat-label">Features Detected</div>
                        </div>
                    </div>
                    <div class="predictions">
            `;

            data.features.forEach(feature => {
                const confidence = (feature.confidence * 100).toFixed(1);
                html += `
                    <div class="prediction-item">
                        <div class="prediction-class">🔍 ${feature.class.toUpperCase()}</div>
                        <div class="prediction-confidence">
                            <span class="confidence-label">Confidence:</span>
                            <div class="confidence-bar">
                                <div class="confidence-fill" style="width: ${confidence}%"></div>
                            </div>
                            <span class="confidence-value">${confidence}%</span>
                        </div>
                    </div>
                `;
            });

            html += `</div></div>`;
            container.innerHTML = html;
        }

        // Rating stars
        document.querySelectorAll('.rating-star').forEach(star => {
            star.addEventListener('click', (e) => {
                const rating = e.target.dataset.rating;
                document.getElementById('accessibilityRating').value = rating;
                document.querySelectorAll('.rating-star').forEach((s, idx) => {
                    s.classList.toggle('active', idx < rating);
                });
            });
        });

        // Review form submission
        document.getElementById('reviewForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!currentPredictionId) {
                showAlert(document.getElementById('reviewAlertContainer'), '❌ Please upload and predict an image first.', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('prediction_id', currentPredictionId);
            formData.append('location_name', document.getElementById('locationName').value);
            formData.append('location_type', document.getElementById('locationType').value);
            formData.append('review_text', document.getElementById('reviewText').value);
            formData.append('accessibility_rating', document.getElementById('accessibilityRating').value);
            formData.append('detected_features', JSON.stringify(currentDetectedFeatures));

            try {
                const response = await fetch(`${API_BASE}/submit-review`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                showAlert(document.getElementById('reviewAlertContainer'), `✅ Review submitted! ID: ${data.review_id}`, 'success');
                document.getElementById('reviewForm').reset();
            } catch (error) {
                showAlert(document.getElementById('reviewAlertContainer'), `❌ Submission failed: ${error.message}`, 'error');
                console.error('Error:', error);
            }
        });
    </script>
</body>
</html>
