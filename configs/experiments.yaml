# Experiment presets for YOLO training
# Each experiment records dataset, model, and key hyperparameters.
default:
  data: /Users/vedantsunillande/spot-repo/NaviAble/NaviAble/data.yaml
  weights: yolo11n.pt
  imgsz: 640
  batch: 16
  epochs: 50
  lr: 0.001
  device: mps
  project: NaviAble_Experiments
  name: default_exp

aug_mosaic_mixup:
  <<: *default
  name: aug_mosaic_mixup
  epochs: 100
  batch: 16
  augmentations:
    mosaic: 0.5
    mixup: 0.2
    hsv: 0.015
    degrees: 10
    translate: 0.1
    scale: [0.5, 1.5]

anchor_tuning:
  <<: *default
  name: anchor_tuning
  epochs: 30
  batch: 32
  recompute_anchors: True

smoke_test:
  <<: *default
  name: smoke_test
  epochs: 1
  batch: 4
  imgsz: 320

